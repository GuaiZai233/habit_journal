version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: habit
      POSTGRES_PASSWORD: habit
      POSTGRES_DB: habit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  api:
    build:
      context: ..
      dockerfile: server/Dockerfile
    depends_on:
      - postgres
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://habit:habit@postgres:5432/habit?sslmode=disable"
    ports:
      - "8080:8080"

volumes:
  pgdata:


